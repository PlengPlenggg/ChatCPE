
services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://testuser:testpassword@db:5432/chatcpe_db
      - APP_BASE_URL=${APP_BASE_URL:-https://chatbot.dev.cpe.kmutt.ac.th}
      - BACKEND_BASE_URL=${BACKEND_BASE_URL:-https://chatbot.dev.cpe.kmutt.ac.th/api}
      - RAG_SERVICE_URL=${RAG_SERVICE_URL:-http://10.35.29.103:8001}
      - RAG_REQUEST_TIMEOUT_SECONDS=${RAG_REQUEST_TIMEOUT_SECONDS:-45}
      - RAG_MAX_RETRIES=${RAG_MAX_RETRIES:-3}
      - RAG_RETRY_DELAY_SECONDS=${RAG_RETRY_DELAY_SECONDS:-1.5}
      - RAG_MAX_TOTAL_WAIT_SECONDS=${RAG_MAX_TOTAL_WAIT_SECONDS:-300}
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@chatcpe.com}
    volumes:
      - ./backend:/app

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      - POSTGRES_DB=chatcpe_db
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
